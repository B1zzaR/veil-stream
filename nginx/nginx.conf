worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    client_max_body_size 20G;
    client_body_timeout 3600s;
    client_body_buffer_size 1m;       # larger reads from client = fewer syscalls
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 60s;
    proxy_buffering off;              # uploads stream straight through, no nginx-side buffering

    upstream backend {
        server backend:8080;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check (proxied to backend)
        location = /healthz {
            proxy_pass http://backend/healthz;
            access_log off;
        }

        # Streaming upload — bypass all buffering for max throughput.
        # Browser → nginx → backend in one pipe, no intermediate disk hops.
        location = /api/videos/upload-one {
            proxy_pass http://backend/api/videos/upload-one;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie $http_cookie;
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_max_temp_file_size 0;
            client_max_body_size 20G;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # API
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_request_buffering off;
        }

        # WebSocket
        location /ws {
            proxy_pass http://backend/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
        }

        # Thumbnails — static
        location /media/thumbnails/ {
            alias /media/thumbnails/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Logos — static
        location /media/logos/ {
            alias /media/logos/;
            expires 1d;
            add_header Cache-Control "public";
        }

        # Uploaded videos — enables in-browser preview with Range support
        # (nginx serves static files with byte ranges out of the box).
        location /media/uploads/ {
            alias /media/uploads/;
            add_header Cache-Control "private, no-transform";
        }

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # HTTPS (uncomment when using Let's Encrypt)
    # server {
    #     listen 443 ssl http2;
    #     server_name YOUR_DOMAIN;
    #
    #     ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #
    #     include the location blocks from above...
    # }
}
