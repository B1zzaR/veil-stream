services:
  postgres:
    image: postgres:15-alpine
    container_name: veil-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-veil}
      POSTGRES_USER: ${POSTGRES_USER:-veil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - veil
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-veil} -d ${POSTGRES_DB:-veil}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veil-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-veil}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-veil}?sslmode=disable
    volumes:
      - media:/media
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - veil

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: veil-frontend
    restart: unless-stopped
    networks:
      - veil
    depends_on:
      - backend

  nginx:
    build:
      context: ./nginx
    container_name: veil-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - media:/media:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    networks:
      - veil
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  media:
  certbot_www:
  certbot_conf:

networks:
  veil:
    driver: bridge
